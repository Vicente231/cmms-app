<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect: store the path and redirect to index
      var path = window.location.pathname;
      sessionStorage.setItem('redirect', path);
      window.location.replace('/cmms-app/');
    </script>
  </head>
  <body></body>
</html>
